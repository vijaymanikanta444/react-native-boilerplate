name: Auto Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure Git User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        id: bump
        run: node scripts/bump-version.js

      - name: Commit, Tag, and Push
        id: commit_push
        run: |
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_tag }}"
          git tag "${{ steps.bump.outputs.new_tag }}"
          git push origin master --follow-tags
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.commit_push.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          name: Release ${{ steps.bump.outputs.new_tag }}
          generate_release_notes: true

      - name: Read Email Recipients
        if: steps.commit_push.outputs.changed == 'true'
        id: contacts
        run: |
          RECIPIENTS=$(node -e "const p=require('./package.json'); const org=p.organization||{}; const emails=[org.supportEmail,org.ownerEmail].filter(Boolean); console.log([...new Set(emails)].join(','));")
          echo "recipients=$RECIPIENTS" >> "$GITHUB_OUTPUT"

      - name: Check SMTP Configuration
        if: steps.commit_push.outputs.changed == 'true'
        id: smtp
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          if [ -n "$SMTP_SERVER" ] && [ -n "$SMTP_USERNAME" ] && [ -n "$SMTP_PASSWORD" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Version Bump Email
        if: steps.commit_push.outputs.changed == 'true' && steps.contacts.outputs.recipients != '' && steps.smtp.outputs.configured == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT || '587' }}
          secure: false
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: '[Release] ${{ github.repository }} ${{ steps.bump.outputs.new_tag }} (${{ steps.bump.outputs.bump_type }})'
          to: ${{ steps.contacts.outputs.recipients }}
          from: ${{ secrets.SMTP_FROM || secrets.SMTP_USERNAME }}
          body: |
            Version bump completed.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Triggered by: ${{ github.actor }}

            Bump type: ${{ steps.bump.outputs.bump_type }}
            Old version: ${{ steps.bump.outputs.old_version }}
            New version: ${{ steps.bump.outputs.new_version }}
            Tag: ${{ steps.bump.outputs.new_tag }}
            Release date changed: ${{ steps.bump.outputs.release_date_changed }}

            Commit: ${{ github.sha }}
            Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.bump.outputs.new_tag }}

      - name: Email Skipped Notice
        if: steps.commit_push.outputs.changed == 'true' && (steps.contacts.outputs.recipients == '' || steps.smtp.outputs.configured != 'true')
        run: |
          echo "Email not sent because recipients or SMTP secrets are missing."
          echo "Recipients: '${{ steps.contacts.outputs.recipients }}'"
